<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS WE LEARN - 分析中控台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121215;
            --bg-panel: #1e1e24;
            --primary: #9370db;
            --primary-glow: rgba(147, 112, 219, 0.4);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #FF5555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 頂部導航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .btn-back { color: var(--text-sub); text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { color: var(--primary); }
        .title { color: var(--primary); margin: 0; font-size: 2rem; text-shadow: 0 0 10px var(--primary-glow); }
        
        /* KPI 卡片區 */
        .kpi-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .kpi-card {
            flex: 1; min-width: 200px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-top: 4px solid var(--primary);
            transition: transform 0.3s;
        }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-title { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px; }
        .kpi-value { font-size: 1.8rem; font-weight: bold; }
        .kpi-highlight { color: var(--danger); font-size: 1.2rem;}

        /* 圖表與控制區 */
        .main-section { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box {
            flex: 2; min-width: 400px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
        }
        .control-box {
            flex: 1; min-width: 300px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        /* 表單元素 */
        label { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 5px; display: block;}
        select, input {
            width: 100%; padding: 10px; font-size: 1rem;
            background-color: var(--bg-dark); color: white;
            border: 1px solid #444; border-radius: 8px; outline: none;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: var(--primary); }

        /* 表格區 */
        .table-box {
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px; overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: var(--primary); font-weight: bold; position: sticky; top: 0; background: var(--bg-panel); }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        
        .loading { text-align: center; font-size: 1.2rem; color: var(--primary); margin: 50px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header">
            <a href="teacher_portal.html" class="btn-back">← 返回教師後台</a>
            <h1 class="title">AS WE LEARN 數據分析</h1>
            <div id="statusIndicator" style="color: #4CAF50; font-size: 0.9em;">● 系統已連線</div>
        </div>

        <div id="loading" class="loading">正在從 Google 雲端同步最新數據...</div>

        <div id="dashboardContent" style="display: none; flex-direction: column; gap: 20px;">
            
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-title">總錯題紀錄數</div>
                    <div class="kpi-value" id="kpiTotal">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">學生遊玩人數</div>
                    <div class="kpi-value" id="kpiStudents">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">最高頻錯題</div>
                    <div class="kpi-value kpi-highlight" id="kpiTopError">-</div>
                </div>
            </div>

            <div class="main-section">
                <div class="chart-box">
                    <h3 style="margin-top: 0; color: #dda0dd;">📊 高頻錯題排行榜</h3>
                    <canvas id="errorChart" height="100"></canvas>
                </div>
                
                <div class="control-panel control-box">
                    <h3 style="margin-top: 0; color: #dda0dd;">⚙️ 數據篩選器</h3>
                    
                    <div>
                        <label for="classFilter">🏫 按班別篩選：</label>
                        <select id="classFilter">
                            <option value="ALL">顯示所有班別 (全校數據)</option>
                        </select>
                    </div>

                    <div>
                        <label for="studentFilter">👨‍🎓 按學生帳號篩選：</label>
                        <select id="studentFilter">
                            <option value="ALL">顯示所有學生</option>
                        </select>
                    </div>

                    <div>
                        <label for="searchBox">🔍 關鍵字搜尋 (題目 / 答案)：</label>
                        <input type="text" id="searchBox" placeholder="輸入關鍵字...">
                    </div>
                    <div style="margin-top: auto; font-size: 0.85em; color: gray;">
                        * 圖表與表格會根據篩選條件即時更新。
                    </div>
                </div>
            </div>

            <div class="table-box">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>時間戳記</th>
                            <th>學生帳號</th>
                            <th>答錯題目</th>
                            <th>錯誤選項</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvzNQagZWaguDWjTGY98muI3EqP578fvCVEkl1B-XeWjuYb0v-J198SKqbbQxHA2NamlRxcEitj-ks/pub?gid=643302752&single=true&output=csv';

        let allData = [];
        let chartInstance = null;

        // 工具函數：從學生帳號提取班別 (例如從 "1A_02_Wong" 提取 "1A")
        function getClassFromStudent(studentAccount) {
            if (!studentAccount) return "未知";
            const parts = studentAccount.split('_');
            return parts.length > 1 ? parts[0] : "獨立帳號 (無班別)";
        }

        Papa.parse(csvUrl, {
            download: true, header: false, skipEmptyLines: true,
            complete: function(results) {
                if (results.data.length <= 1) {
                    document.getElementById('loading').innerText = "⚠️ 成功連接，但表內沒有數據。";
                    return;
                }

                const rawData = results.data.slice(1);
                allData = rawData.filter(row => row[1] && row[1].trim() !== '');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'flex';

                initDashboard();
            },
            error: function(err) {
                document.getElementById('loading').innerText = "❌ 網絡連線失敗，請檢查 CSV 連結。";
            }
        });

        function initDashboard() {
            populateClassFilter(); // 先填入所有班別
            updateStudentDropdown('ALL'); // 填入所有學生
            updateDashboard(allData);

            // 綁定事件
            document.getElementById('classFilter').addEventListener('change', function() {
                // 當班別改變時，更新學生清單，並重置學生選擇
                updateStudentDropdown(this.value);
                handleFilter();
            });
            document.getElementById('studentFilter').addEventListener('change', handleFilter);
            document.getElementById('searchBox').addEventListener('input', handleFilter);
        }

        // 填入班別 Dropdown
        function populateClassFilter() {
            const classSelect = document.getElementById('classFilter');
            const uniqueClasses = [...new Set(allData.map(row => getClassFromStudent(row[1])))].sort();
            
            uniqueClasses.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls; 
                option.textContent = cls;
                classSelect.appendChild(option);
            });
        }

        // 動態更新學生 Dropdown (聯動效果)
        function updateStudentDropdown(selectedClass) {
            const studentSelect = document.getElementById('studentFilter');
            studentSelect.innerHTML = '<option value="ALL">顯示所有學生</option>'; // 清空並重置

            let validStudents = allData;
            if (selectedClass !== 'ALL') {
                validStudents = allData.filter(row => getClassFromStudent(row[1]) === selectedClass);
            }

            const uniqueStudents = [...new Set(validStudents.map(row => row[1]))].sort();
            uniqueStudents.forEach(student => {
                const option = document.createElement('option');
                option.value = student; 
                option.textContent = student;
                studentSelect.appendChild(option);
            });
        }

        // 核心過濾邏輯 (結合班別、學生、關鍵字)
        function handleFilter() {
            const selectedClass = document.getElementById('classFilter').value;
            const selectedStudent = document.getElementById('studentFilter').value;
            const keyword = document.getElementById('searchBox').value.toLowerCase();

            let filtered = allData;

            // 1. 班別篩選
            if (selectedClass !== 'ALL') {
                filtered = filtered.filter(row => getClassFromStudent(row[1]) === selectedClass);
            }

            // 2. 學生篩選
            if (selectedStudent !== 'ALL') {
                filtered = filtered.filter(row => row[1] === selectedStudent);
            }

            // 3. 關鍵字搜尋
            if (keyword) {
                filtered = filtered.filter(row => 
                    (row[2] && row[2].toLowerCase().includes(keyword)) || 
                    (row[3] && row[3].toLowerCase().includes(keyword))
                );
            }

            updateDashboard(filtered);
        }

        function updateDashboard(data) {
            updateKPIs(data);
            renderTable(data);
            renderChart(data);
        }

        function updateKPIs(data) {
            document.getElementById('kpiTotal').innerText = data.length;
            const uniqueStudents = new Set(data.map(row => row[1])).size;
            document.getElementById('kpiStudents').innerText = uniqueStudents;

            if (data.length > 0) {
                const qCounts = {};
                data.forEach(row => { qCounts[row[2]] = (qCounts[row[2]] || 0) + 1; });
                const topQ = Object.keys(qCounts).reduce((a, b) => qCounts[a] > qCounts[b] ? a : b);
                document.getElementById('kpiTopError').innerText = topQ.length > 15 ? topQ.substring(0, 15) + "..." : topQ;
                document.getElementById('kpiTopError').title = topQ; 
            } else {
                document.getElementById('kpiTopError').innerText = "-";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #a0a0a0; font-size: 0.85em;">${row[0] || '-'}</td>
                    <td style="font-weight: bold;">${row[1] || '-'}</td>
                    <td>${row[2] || '-'}</td>
                    <td style="color: #FF5555;">${row[3] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderChart(data) {
            const ctx = document.getElementById('errorChart').getContext('2d');
            
            const qCounts = {};
            data.forEach(row => { 
                const q = row[2] || '未知題目';
                qCounts[q] = (qCounts[q] || 0) + 1; 
            });

            const sortedData = Object.entries(qCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const labels = sortedData.map(item => item[0].length > 10 ? item[0].substring(0, 10) + '...' : item[0]);
            const values = sortedData.map(item => item[1]);
            const fullLabels = sortedData.map(item => item[0]);

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '答錯次數',
                        data: values,
                        backgroundColor: 'rgba(147, 112, 219, 0.7)',
                        borderColor: 'rgba(147, 112, 219, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: function(context) { return fullLabels[context[0].dataIndex]; } 
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#a0a0a0', stepSize: 1 }, grid: { color: '#333' } },
                        x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
