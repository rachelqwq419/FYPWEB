<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS WE LEARN - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="AS_WE_LREAN.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121215;
            --bg-panel: #1e1e24;
            --primary: #9370db;
            --primary-glow: rgba(147, 112, 219, 0.4);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #FF5555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        
        .btn-back { color: var(--text-sub); text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { color: var(--primary); }
        .title { color: var(--primary); margin: 0; font-size: 2rem; text-shadow: 0 0 10px var(--primary-glow); }
        
        .btn-lang {
            background-color: #33333b;
            color: white;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-lang:hover { background-color: var(--primary); border-color: var(--primary); }

        .kpi-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .kpi-card {
            flex: 1; min-width: 200px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-top: 4px solid var(--primary);
            transition: transform 0.3s;
        }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-title { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px; }
        .kpi-value { font-size: 1.8rem; font-weight: bold; }
        .kpi-highlight { color: var(--danger); font-size: 1.2rem;}

        .main-section { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box {
            flex: 2; min-width: 400px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
        }
        .control-box {
            flex: 1; min-width: 300px;
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        label { color: var(--text-sub); font-size: 0.9rem; margin-bottom: 5px; display: block;}
        select, input {
            width: 100%; padding: 10px; font-size: 1rem;
            background-color: var(--bg-dark); color: white;
            border: 1px solid #444; border-radius: 8px; outline: none;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: var(--primary); }

        .table-box {
            background-color: var(--bg-panel);
            padding: 20px; border-radius: 12px; overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        
        /* 🔥 排序表頭樣式 */
        th { 
            color: var(--primary); 
            font-weight: bold; 
            position: sticky; 
            top: 0; 
            background: var(--bg-panel); 
            cursor: pointer; 
            user-select: none;
            transition: background 0.2s;
        }
        th:hover { background: #2a2a30; }
        .sort-icon { margin-left: 5px; font-size: 0.8em; color: var(--text-sub); }

        tr:hover { background-color: rgba(255,255,255,0.05); }
        .loading { text-align: center; font-size: 1.2rem; color: var(--primary); margin: 50px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <div class="header-left">
                
                <a href="index.html" class="btn-back" data-i18n="backBtn">← 返回教師後台</a>
                <h1 class="title" data-i18n="mainTitle">AS WE LEARN 數據分析</h1>
            </div>
            <div class="header-right">
                <div id="statusIndicator" style="color: #4CAF50; font-size: 0.9em;" data-i18n="statusConnected">● 系統已連線</div>
                <button class="btn-lang" id="langToggle" onclick="toggleLanguage()">🌐 EN</button>
            </div>
        </div>

        <div id="loading" class="loading" data-i18n="loadingData">正在從 Google 雲端同步最新數據...</div>

        <div id="dashboardContent" style="display: none; flex-direction: column; gap: 20px;">
            
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-title" data-i18n="kpiTotal">總錯題紀錄數</div>
                    <div class="kpi-value" id="kpiTotal">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title" data-i18n="kpiStudents">學生遊玩人數</div>
                    <div class="kpi-value" id="kpiStudents">-</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title" data-i18n="kpiTopError">最高頻錯題</div>
                    <div class="kpi-value kpi-highlight" id="kpiTopError">-</div>
                </div>
            </div>

            <div class="main-section">
                <div class="chart-box">
                    <h3 style="margin-top: 0; color: #dda0dd;" data-i18n="chartTitle">📊 高頻錯題排行榜</h3>
                    <canvas id="errorChart" height="100"></canvas>
                </div>
                
                <div class="control-panel control-box">
                    <h3 style="margin-top: 0; color: #dda0dd;" data-i18n="filterTitle">⚙️ 數據篩選器</h3>
                    
                    <div>
                        <label for="subjectFilter" data-i18n="filterSubject">📖 按科目篩選：</label>
                        <select id="subjectFilter">
                            <option value="ALL" data-i18n="optAllSubjects">所有科目 (All Subjects)</option>
                            <option value="Chinese">中文科 (Chinese)</option>
                            <option value="English">英文科 (English)</option>
                            <option value="Math">數學科 (Math)</option>
                        </select>
                    </div>

                    <div>
                        <label for="classFilter" data-i18n="filterClass">🏫 按班別篩選：</label>
                        <select id="classFilter"></select>
                    </div>

                    <div>
                        <label for="studentFilter" data-i18n="filterStudent">👨‍🎓 按學生帳號篩選：</label>
                        <select id="studentFilter"></select>
                    </div>

                    <div>
                        <label for="searchBox" data-i18n="filterSearch">🔍 關鍵字搜尋(題目 / 答案)：</label>
                        <input type="text" id="searchBox" placeholder="輸入關鍵字...">
                    </div>
                    <div style="margin-top: auto; font-size: 0.85em; color: gray;" data-i18n="filterHint">
                        * 圖表與表格會根據篩選條件即時更新。
                    </div>
                </div>
            </div>

            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th id="colTime" onclick="requestSort(0)">
                                <span data-i18n="thTime">時間戳記</span><span class="sort-icon" id="icon0"></span>
                            </th>
                            <th id="colStudent" onclick="requestSort(1)">
                                <span data-i18n="thStudent">學生帳號</span><span class="sort-icon" id="icon1"></span>
                            </th>
                            <th onclick="requestSort(2)">
                                <span data-i18n="thQuestion">答錯題目</span><span class="sort-icon" id="icon2"></span>
                            </th>
                            <th><span data-i18n="thWrongAns">錯誤選項</span></th>
                            <th onclick="requestSort(4)">
                                <span data-i18n="thSubject">科目</span><span class="sort-icon" id="icon4"></span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        const dict = {
            zh: {
                backBtn: "← 返回教師後台", mainTitle: "AS WE LEARN 數據分析", statusConnected: "● 系統已連線",
                loadingData: "正在從 Google 雲端同步最新數據...", kpiTotal: "總錯題紀錄數", kpiStudents: "學生遊玩人數",
                kpiTopError: "最高頻錯題", chartTitle: "📊 高頻錯題排行榜", filterTitle: "⚙️ 數據篩選器",
                filterSubject: "📖 按科目篩選：", filterClass: "🏫 按班別篩選：", filterStudent: "👨‍🎓 按學生帳號篩選：", 
                filterSearch: "🔍 關鍵字搜尋 (題目 / 答案)：", filterHint: "* 圖表與表格會根據篩選條件即時更新。", 
                thTime: "時間戳記", thStudent: "學生帳號", thQuestion: "答錯題目", thWrongAns: "錯誤選項", thSubject: "科目",
                optAllClasses: "顯示所有班別 (全校數據)", optAllStudents: "顯示所有學生", optAllSubjects: "所有科目 (All Subjects)",
                searchPlaceholder: "輸入關鍵字...", independent: "獨立帳號 (無班別)",
                noData: "⚠️ 成功連接，但表內沒有數據。", netError: "❌ 網絡連線失敗，請檢查 CSV 連結。", chartLabel: "答錯次數"
            },
            en: {
                backBtn: "← Back to Portal", mainTitle: "AS WE LEARN Analytics", statusConnected: "● System Online",
                loadingData: "Syncing data from Google Cloud...", kpiTotal: "Total Error Records", kpiStudents: "Active Students",
                kpiTopError: "Most Frequent Error", chartTitle: "📊 Top Errors Leaderboard", filterTitle: "⚙️ Data Filters",
                filterSubject: "📖 Filter by Subject:", filterClass: "🏫 Filter by Class:", filterStudent: "👨‍🎓 Filter by Student:", 
                filterSearch: "🔍 Keyword Search (Q&A):", filterHint: "* Charts and tables update instantly based on filters.", 
                thTime: "Timestamp", thStudent: "Student ID", thQuestion: "Question", thWrongAns: "Wrong Answer", thSubject: "Subject",
                optAllClasses: "All Classes (School Data)", optAllStudents: "All Students", optAllSubjects: "All Subjects",
                searchPlaceholder: "Enter keywords...", independent: "Independent (No Class)",
                noData: "⚠️ Connected, but no data available.", netError: "❌ Connection failed, check CSV link.", chartLabel: "Error Count"
            }
        };

        let currentLang = 'zh';
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvzNQagZWaguDWjTGY98muI3EqP578fvCVEkl1B-XeWjuYb0v-J198SKqbbQxHA2NamlRxcEitj-ks/pub?gid=643302752&single=true&output=csv';

        let allData = [];
        let chartInstance = null;
        let currentSort = { index: null, direction: 'asc' };

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('langToggle').innerText = currentLang === 'zh' ? '🌐 EN' : '🌐 中文';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[currentLang][key]) el.innerText = dict[currentLang][key];
            });
            document.getElementById('searchBox').placeholder = dict[currentLang].searchPlaceholder;
            if (allData.length > 0) {
                const curSub = document.getElementById('subjectFilter').value;
                const curClass = document.getElementById('classFilter').value;
                const curStudent = document.getElementById('studentFilter').value;
                populateClassFilter();
                document.getElementById('subjectFilter').value = curSub;
                document.getElementById('classFilter').value = curClass;
                updateStudentDropdown(curClass);
                document.getElementById('studentFilter').value = curStudent;
                handleFilter();
            }
        }

        function getClassFromStudent(acc) {
            if (!acc) return "UNKNOWN";
            const p = acc.split('_');
            return p.length > 1 ? p[0] : "INDEPENDENT";
        }

        Papa.parse(csvUrl, {
            download: true, header: false, skipEmptyLines: true,
            complete: function(res) {
                if (res.data.length <= 1) {
                    document.getElementById('loading').innerText = dict[currentLang].noData;
                    return;
                }
                const raw = res.data.slice(1);
                allData = raw.filter(r => r[1] && r[1].trim() !== '');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'flex';
                initDashboard();
            },
            error: function() { document.getElementById('loading').innerText = dict[currentLang].netError; }
        });

        function initDashboard() {
            toggleLanguage(); toggleLanguage();
            populateClassFilter();
            updateStudentDropdown('ALL');
            updateDashboard(allData);

            document.getElementById('subjectFilter').addEventListener('change', handleFilter);
            document.getElementById('classFilter').addEventListener('change', function() {
                updateStudentDropdown(this.value);
                handleFilter();
            });
            document.getElementById('studentFilter').addEventListener('change', handleFilter);
            document.getElementById('searchBox').addEventListener('input', handleFilter);
        }

        function populateClassFilter() {
            const sel = document.getElementById('classFilter');
            sel.innerHTML = `<option value="ALL">${dict[currentLang].optAllClasses}</option>`;
            const u = [...new Set(allData.map(r => getClassFromStudent(r[1])))].sort();
            u.forEach(c => {
                const o = document.createElement('option');
                o.value = c; o.textContent = c === "INDEPENDENT" ? dict[currentLang].independent : c;
                sel.appendChild(o);
            });
        }

        function updateStudentDropdown(cls) {
            const sel = document.getElementById('studentFilter');
            sel.innerHTML = `<option value="ALL">${dict[currentLang].optAllStudents}</option>`;
            let filtered = cls === 'ALL' ? allData : allData.filter(r => getClassFromStudent(r[1]) === cls);
            const u = [...new Set(filtered.map(r => r[1]))].sort();
            u.forEach(s => {
                const o = document.createElement('option');
                o.value = s; o.textContent = s;
                sel.appendChild(o);
            });
        }

        // 🔥 排序控制：點擊表頭觸發
        function requestSort(index) {
            if (currentSort.index === index) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.index = index;
                currentSort.direction = 'asc';
            }
            updateSortIcons();
            handleFilter(); // 重新過濾並執行排序
        }

        function updateSortIcons() {
            document.querySelectorAll('.sort-icon').forEach(el => el.innerText = '');
            if (currentSort.index !== null) {
                const icon = document.getElementById('icon' + currentSort.index);
                if (icon) icon.innerText = currentSort.direction === 'asc' ? ' ▲' : ' ▼';
            }
        }

        function handleFilter() {
            const sub = document.getElementById('subjectFilter').value;
            const cls = document.getElementById('classFilter').value;
            const stu = document.getElementById('studentFilter').value;
            const key = document.getElementById('searchBox').value.toLowerCase();

            let data = [...allData];

            // 1. 科目篩選
            if (sub !== 'ALL') {
                data = data.filter(r => {
                    const colSub = r[4] ? r[4].toLowerCase() : '';
                    return colSub.includes(sub.toLowerCase());
                });
            }

            // 2. 班別篩選
            if (cls !== 'ALL') data = data.filter(r => getClassFromStudent(r[1]) === cls);
            
            // 3. 學生篩選
            if (stu !== 'ALL') data = data.filter(r => r[1] === stu);
            
            // 4. 關鍵字搜尋
            if (key) data = data.filter(r => (r[2] && r[2].toLowerCase().includes(key)) || (r[3] && r[3].toLowerCase().includes(key)));

            // 🔥 5. 排序邏輯 (一樣嘅會排埋一齊)
            if (currentSort.index !== null) {
                data.sort((a, b) => {
                    let valA = (a[currentSort.index] || "").toString();
                    let valB = (b[currentSort.index] || "").toString();
                    
                    // 使用 localeCompare 處理中英文排序，確保一致性
                    return currentSort.direction === 'asc' 
                        ? valA.localeCompare(valB, 'zh-HK', {numeric: true}) 
                        : valB.localeCompare(valA, 'zh-HK', {numeric: true});
                });
            }

            updateDashboard(data);
        }

        function updateDashboard(data) {
            updateKPIs(data);
            renderTable(data);
            renderChart(data);
        }

        function updateKPIs(data) {
            document.getElementById('kpiTotal').innerText = data.length;
            document.getElementById('kpiStudents').innerText = new Set(data.map(r => r[1])).size;
            if (data.length > 0) {
                const c = {}; data.forEach(r => { c[r[2]] = (c[r[2]] || 0) + 1; });
                const top = Object.keys(c).reduce((a, b) => c[a] > c[b] ? a : b);
                document.getElementById('kpiTopError').innerText = top.length > 15 ? top.substring(0, 15) + "..." : top;
                document.getElementById('kpiTopError').title = top;
            } else { document.getElementById('kpiTopError').innerText = "-"; }
        }

        function renderTable(data) {
            const tb = document.getElementById('tableBody');
            tb.innerHTML = '';
            data.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #a0a0a0; font-size: 0.85em;">${r[0] || '-'}</td>
                    <td style="font-weight: bold;">${r[1] || '-'}</td>
                    <td>${r[2] || '-'}</td>
                    <td style="color: #FF5555;">${r[3] || '-'}</td>
                    <td style="color: var(--primary); font-weight: bold;">${r[4] || '-'}</td>
                `;
                tb.appendChild(tr);
            });
        }

        function renderChart(data) {
            const ctx = document.getElementById('errorChart').getContext('2d');
            const c = {}; data.forEach(r => { const q = r[2] || '未知'; c[q] = (c[q] || 0) + 1; });
            const s = Object.entries(c).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const lab = s.map(i => i[0].length > 10 ? i[0].substring(0, 10) + '...' : i[0]);
            const val = s.map(i => i[1]);
            const full = s.map(i => i[0]);

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lab,
                    datasets: [{
                        label: dict[currentLang].chartLabel, data: val,
                        backgroundColor: 'rgba(147, 112, 219, 0.7)', borderColor: 'rgba(147, 112, 219, 1)',
                        borderWidth: 1, borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, tooltip: { callbacks: { title: (ctx) => full[ctx[0].dataIndex] } } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#a0a0a0', stepSize: 1 }, grid: { color: '#333' } },
                        x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
