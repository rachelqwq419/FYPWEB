<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS WE LEARN - 學生表現數據分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1d;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            background-color: #26262b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 {
            color: #dda0dd; /* 淺紫色 */
            text-align: center;
            border-bottom: 2px solid #33333b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background-color: #33333b;
            padding: 15px;
            border-radius: 10px;
        }
        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: none;
            background-color: #1a1a1d;
            color: white;
            outline: none;
            cursor: pointer;
        }
        .stats {
            font-size: 1.1rem;
            font-weight: bold;
            color: #9370db;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #33333b;
        }
        th {
            background-color: #1a1a1d;
            color: #dda0dd;
            font-weight: bold;
        }
        tr:hover {
            background-color: #33333b;
        }
        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #a0a0a0;
            margin: 20px 0;
        }
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: #a0a0a0;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .btn-back:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="teacher_portal.html" class="btn-back">← 返回教師後台</a>
        <h1>📊 學生錯題數據庫 (Error Logs)</h1>

        <div class="control-panel">
            <div>
                <label for="studentFilter">篩選學生帳號：</label>
                <select id="studentFilter">
                    <option value="ALL">顯示所有學生</option>
                    </select>
            </div>
            <div class="stats" id="recordCount">載入中...</div>
        </div>

        <div id="loading" class="loading">正在從 Google 雲端同步數據...</div>

        <table id="dataTable" style="display: none;">
            <thead>
                <tr>
                    <th>時間戳記</th>
                    <th>學生帳號</th>
                    <th>答錯題目</th>
                    <th>錯誤選項</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
		// 直接使用「發佈到網路」嘅 CSV 連結
		const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSvzNQagZWaguDWjTGY98muI3EqP578fvCVEkl1B-XeWjuYb0v-J198SKqbbQxHA2NamlRxcEitj-ks/pub?gid=643302752&single=true&output=csv';
		
		let allData = [];
		
		// 使用 PapaParse 讀取 CSV
		Papa.parse(csvUrl, {
		    download: true,
		    header: false, // 🔥 關鍵修改：關閉標題配對，改用純位置讀取 (防禦標題隱形空格)
		    skipEmptyLines: true,
		    complete: function(results) {
		        
		        // 如果連標題都冇，即係空表
		        if (results.data.length <= 1) {
		            document.getElementById('loading').innerText = "⚠️ 成功連接，但表內沒有數據。";
		            return;
		        }
		
		        // 抽起第一行 (標題)，淨低嘅就係純數據
		        const rawData = results.data.slice(1);
		
		        // 過濾掉 B 欄 (Index 1) 係空嘅行
		        allData = rawData.filter(row => row[1] && row[1].trim() !== '');
		
		        if (allData.length === 0) {
		            document.getElementById('loading').innerText = "⚠️ 找不到有效的學生數據。";
		            return;
		        }
		
		        // 成功處理數據，顯示表格
		        document.getElementById('loading').style.display = 'none';
		        document.getElementById('dataTable').style.display = 'table';
		
		        populateFilter();
		        renderTable(allData);
		    },
		    error: function(error) {
		        document.getElementById('loading').innerText = "❌ 網絡連線失敗，請確認 CSV 連結正確。";
		        console.error("Error:", error);
		    }
		});
		
		// 提取獨立嘅學生帳號並加入 Dropdown
		function populateFilter() {
		    const select = document.getElementById('studentFilter');
		    // row[1] 就係 B 欄「學生帳號」
		    const uniqueStudents = [...new Set(allData.map(item => item[1]))];
		
		    uniqueStudents.forEach(student => {
		        const option = document.createElement('option');
		        option.value = student;
		        option.textContent = student;
		        select.appendChild(option);
		    });
		
		    // 監聽選擇改變事件
		    select.addEventListener('change', function() {
		        if (this.value === 'ALL') {
		            renderTable(allData);
		        } else {
		            const filteredData = allData.filter(row => row[1] === this.value);
		            renderTable(filteredData);
		        }
		    });
		}
		
		// 將數據渲染到表格
		function renderTable(data) {
		    const tbody = document.getElementById('tableBody');
		    const countDisplay = document.getElementById('recordCount');
		
		    tbody.innerHTML = ''; // 清空舊數據
		    countDisplay.innerText = `目前顯示：${data.length} 條錯題紀錄`;
		
		    data.forEach(row => {
		        const tr = document.createElement('tr');
		
		        // 根據欄位位置讀取 (A欄=0, B欄=1, C欄=2, D欄=3)
		        const timeStr = row[0] || '-';
		        const student = row[1] || '-';
		        const question = row[2] || '-';
		        const wrongAns = row[3] || '-';
		
		        tr.innerHTML = `
		            <td style="color: #a0a0a0; font-size: 0.9em;">${timeStr}</td>
		            <td style="font-weight: bold; color: #ffffff;">${student}</td>
		            <td>${question}</td>
		            <td style="color: #FF5555;">${wrongAns}</td>
		        `;
		        tbody.appendChild(tr);
		    });
		}
    </script>

</body>
</html>
